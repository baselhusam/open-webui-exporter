# Full observability stack: exporter + Prometheus + Grafana.
#
#   docker compose -f docker-compose.monitoring.yml up -d
#
# This is a superset of docker-compose.yml — the exporter service is pulled in
# from that file via `extends`, so its image/env/volumes are defined once. Run
# this file *or* the plain docker-compose.yml, never both (same container name
# and host port).
#
# What you get:
#   - exporter    -> scrapes the Open WebUI REST API, exposes /metrics    (localhost:9090)
#   - prometheus  -> scrapes the exporter, stores the time series         (localhost:9091)
#   - grafana     -> pre-provisioned datasource + dashboard               (localhost:3001)
#
# The exporter reaches Open WebUI over the host (host.docker.internal:3000), so
# this stack stays fully independent of the app's compose network. If you don't
# already have an Open WebUI, start one first:
#   docker compose -f docker-compose.openwebui.yml up -d
#
# Reads OPENWEBUI_API_KEY (and the optional pricing vars) from the .env file next
# to this compose file — copy .env.example to .env and fill in your API key.
#
# Tear it down (Grafana/Prometheus data is kept in named volumes):
#   docker compose -f docker-compose.monitoring.yml down

# Own project name so this stack is fully independent of the Open WebUI compose —
# they never share networks/volumes and never orphan each other.
name: openwebui-monitoring

services:
  exporter:
    # Single source of truth: docker-compose.yml. Override EXPORTER_IMAGE et al
    # there or in .env, not here.
    extends:
      file: docker-compose.yml
      service: exporter

  prometheus:
    image: prom/prometheus:latest
    container_name: openwebui-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - exporter

  grafana:
    image: grafana/grafana:latest
    container_name: openwebui-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      # Local-dev convenience: open Grafana without a login. Remove these for
      # any shared/production deployment.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboard.json:/var/lib/grafana/dashboards/dashboard.json:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
