# Observability stack for Open WebUI: exporter + Prometheus + Grafana.
#
# This is a SEPARATE stack from the app. Start the app first (docker-compose.yml),
# then bring this up alongside it:
#
#   docker compose -f docker-compose.monitoring.yml up -d
#
# The exporter runs the pre-built image published by CI (GHCR by default) — no
# local build. Pin a different tag or switch to Docker Hub via EXPORTER_IMAGE.
#
# What you get:
#   - exporter    -> scrapes the Open WebUI REST API, exposes /metrics    (localhost:9090)
#   - prometheus  -> scrapes the exporter, stores the time series         (localhost:9091)
#   - grafana     -> pre-provisioned datasource + dashboard               (localhost:3001)
#
# The exporter reaches Open WebUI over the host (host.docker.internal:3000), so
# this stack stays fully independent of the app's compose network. It reads
# OPENWEBUI_API_KEY (and optionally OPENWEBUI_BASE_URL) from the .env file next
# to this compose file — copy .env.example to .env and fill in your API key.
#
# Tear it down (Grafana/Prometheus data is kept in named volumes):
#   docker compose -f docker-compose.monitoring.yml down

# Own project name so this stack is fully independent of the app compose —
# they never share networks/volumes and never orphan each other.
name: openwebui-monitoring

services:
  exporter:
    # Pre-built image published by CI. Defaults to GHCR; override to use Docker
    # Hub or pin a version/sha tag, e.g.:
    #   EXPORTER_IMAGE=docker.io/baselhusam/open-webui-exporter:latest
    #   EXPORTER_IMAGE=ghcr.io/baselhusam/open-webui-exporter:v0.1.0
    image: ${EXPORTER_IMAGE:-ghcr.io/baselhusam/open-webui-exporter:latest}
    container_name: openwebui-exporter
    restart: unless-stopped
    ports:
      - "9090:9090"
    environment:
      # Fixed to the host gateway: this reaches the Open WebUI published on the
      # host by docker-compose.yml. (Don't use localhost here — that would be the
      # exporter container itself. Only the API key is read from .env.)
      OPENWEBUI_BASE_URL: http://host.docker.internal:3000
      OPENWEBUI_API_KEY: ${OPENWEBUI_API_KEY:?set OPENWEBUI_API_KEY in .env}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-30}
      EXPORTER_PORT: "9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  prometheus:
    image: prom/prometheus:latest
    container_name: openwebui-prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - exporter

  grafana:
    image: grafana/grafana:latest
    container_name: openwebui-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      # Local-dev convenience: open Grafana without a login. Remove these for
      # any shared/production deployment.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboard.json:/var/lib/grafana/dashboards/dashboard.json:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
